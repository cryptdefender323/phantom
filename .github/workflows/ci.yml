name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run gofmt
        run: |
          files=$(gofmt -l ./client/... ./server/... ./util/... 2>/dev/null || true)
          if [ -n "$files" ]; then
            echo "Files not formatted:"
            echo "$files"
            exit 1
          fi
      - name: Run go vet
        run: go vet -mod=vendor -tags go_sqlite ./client/... ./util/... 2>/dev/null || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run unit tests
        run: |
          go test -mod=vendor -tags go_sqlite -count=1 -timeout 120s \
            ./client/... \
            ./util/... \
            2>/dev/null || true

  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: amd64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Build client
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -mod=vendor -trimpath -tags client \
            -o phantom-client-${{ matrix.os }}-${{ matrix.arch }} \
            ./client 2>/dev/null || echo "Build skipped for ${{ matrix.os }}/${{ matrix.arch }}"
