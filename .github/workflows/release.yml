name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
          - os: freebsd
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Build server
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -mod=vendor -trimpath -tags go_sqlite,server \
            -ldflags="-s -w -X github.com/cryptdefender3232/phantom/client/version.Version=${{ github.ref_name }}" \
            -o phantom-server-${{ matrix.os }}-${{ matrix.arch }}${EXT} \
            . || echo "Build skipped"
      - name: Build client
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -mod=vendor -trimpath -tags client \
            -ldflags="-s -w -X github.com/cryptdefender3232/phantom/client/version.Version=${{ github.ref_name }}" \
            -o phantom-client-${{ matrix.os }}-${{ matrix.arch }}${EXT} \
            ./client || echo "Build skipped"
      - name: Generate checksums
        run: |
          sha256sum phantom-*-${{ matrix.os }}-${{ matrix.arch }}* > checksums-${{ matrix.os }}-${{ matrix.arch }}.txt 2>/dev/null || true
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            phantom-*-${{ matrix.os }}-${{ matrix.arch }}*
            checksums-${{ matrix.os }}-${{ matrix.arch }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
