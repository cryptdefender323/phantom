name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, check if it's already reported in [existing issues](../../issues).

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server
        - Client
        - Implant
        - C2 (mTLS)
        - C2 (HTTP/S)
        - C2 (DNS)
        - C2 (WireGuard)
        - Engagement Management
        - Audit Log
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Phantom Version
      placeholder: "v1.0.0 or git commit hash"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Server OS, client OS, target OS
      placeholder: |
        Server: Ubuntu 22.04 amd64
        Client: macOS 14 arm64
        Target: Windows 11 amd64
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with `./phantom-server`
        2. Generate implant with `generate --mtls ...`
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server logs from `~/.phantom/logs/` or client output
      render: shell
